<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Deliveryit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="index.html" class="login-logo">Delivery<span>it</span></a>
                <h1>Forgot Password</h1>
            </div>
            <form id="forgotPasswordForm" class="login-form">
                <div class="form-group">
                    <label for="resetEmail">Enter your email address to reset your password:</label>
                    <input type="email" id="resetEmail" placeholder="Email" required>
                </div>
                <button type="submit" class="login-btn">Reset Password</button>
                <p class="login-links">
                    <a href="customer-login.html">Back to Login</a>
                </p>
            </form>
            <p id="forgotPasswordMessage"></p>
        </div>
    </div>
    <script type="module" src="js/firebase-config.js"></script>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const resetEmailInput = document.getElementById('resetEmail');
        const forgotPasswordMessage = document.getElementById('forgotPasswordMessage');

        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = resetEmailInput.value;
            try {
                await sendPasswordResetEmail(auth, email);
                forgotPasswordMessage.innerHTML = 'Password reset email sent! Check your inbox.<br><small style="color: #666;">Note: If you don\'t see it, please check your <b>Spam</b> folder.</small>';
                forgotPasswordMessage.style.color = 'green';
            } catch (error) {
                forgotPasswordMessage.textContent = `Error: ${error.message}`;
                forgotPasswordMessage.style.color = 'red';
                console.error('Password reset error:', error);
            }
        });
    </script>
</body>
</html>
