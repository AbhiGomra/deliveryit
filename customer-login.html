<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Deliveryit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container" style="max-width:400px; margin-top:60px;">
    <h2>Customer Login</h2>

    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="Enter Email" required>
      </div>

      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="Enter Password" required>
      </div>

      <div class="login-actions">
        <button type="submit" class="login-btn" id="loginBtn">Login</button>
        <a href="forgot-email.html" class="forgot-email">Forgot Email?</a>
      </div>
    </form>

    <p style="margin-top:15px;">
      Don't have account? 
      <a href="customer-register.html">Register</a>
    </p>
  </div>

  <script type="module" src="js/customer-auth.js"></script>

</body>
</html>
