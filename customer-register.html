<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Deliveryit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container" style="max-width:400px; margin-top:60px;">
    <h2>Create Account</h2>

    <form id="registerForm">
      <div class="form-group">
        <input type="email" id="registerEmail" placeholder="Enter Email" required>
      </div>

      <div class="form-group">
        <input type="password" id="registerPassword" placeholder="Enter Password" required>
      </div>

      <button type="submit" class="save-btn" style="width:100%;">
        Register
      </button>
    </form>

    <p style="margin-top:15px;">
      Already have account? 
      <a href="customer-login.html">Login</a>
    </p>
  </div>

  <script type="module" src="js/customer-auth.js"></script>

</body>
</html>
